<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skeleyon Loading Animation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grid-container">
        
    </div>

    <template id="card-template">
      <div class="card">
        <div class="header">
          <img
            class="header-img skeleton"
             src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8cGVyc29ufGVufDB8fDB8fHww"
            alt=""
          />
          <div class="tittle" data-title>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text"></div>
          </div>
        </div>
        <div data-body>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text"></div>
        </div>
      </div>
    </template>

    <script>
      const grid = document.querySelector(".grid-container");
      const cardTemplate = document.getElementById("card-template");
      for (let i = 0; i < 10; i++) {
        grid.append(cardTemplate.content.cloneNode(true));

        fetch("https://jsonplaceholder.typicode.com/posts")
          .then((res) => res.json())
          .then((posts) => {
            grid.innerHTML = "";
            posts.forEach((post) => {
              const div = cardTemplate.content.cloneNode(true);
              div.querySelector("[data-title]").textContent = post.title;
              div.querySelector("[data-body]").textContent = post.body;
              grid.append(div);
            });
          });
      }


    </script>
  </body>
</html>
