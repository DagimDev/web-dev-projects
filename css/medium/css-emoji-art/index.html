<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Css Emoji Art</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="emoji">
      <div class="head">
        <div class="eyes">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
        </div>
        <div class="mouth smile"></div>
      </div>
    </div>
    <div class="emoji">
      <div class="head">
        <div class="eyes">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
        </div>
        <di class="face-mask mouth">
            <div class="strap strap-top-left"></div>
            <div class="strap strap-top-right"></div>
            <div class="strap strap-bottom-left"></div>
            <div class="strap strap-bottom-right"></div>
        </di>
      </div>
    </div>
    <div class="emoji">
      <div class="head">
        <div class="eyes">
          <div class="eye eye-left"></div>
          <div class="eye eye-right"></div>
        </div>
        <div class="open-mouth mouth"></div>
      </div>
    </div>
    
  </body>
</html>
